<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Záměření — Plisé rolety</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;color:#1a1a1a;padding:1rem}
.app{max-width:600px;margin:0 auto}
h1{font-size:18px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:1.25rem}
.section{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.stitle{font-size:11px;font-weight:700;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px}
input,select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
input:focus,select:focus{border-color:#1a6eb5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#e6f1fb;color:#185FA5;font-weight:700}
.card{background:#f8f8f6;border:1px solid #eee;border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start}
.card-name{font-size:13px;font-weight:700}
.card-meta{font-size:11px;color:#888;margin-top:3px;line-height:1.6}
.del{background:none;border:none;color:#bbb;cursor:pointer;font-size:15px;padding:2px 7px;border-radius:6px}
.del:hover{color:#e24b4a;background:#fef2f2}
.btn-add{width:100%;padding:10px;border:1.5px dashed #ccc;border-radius:8px;background:none;color:#888;cursor:pointer;font-size:13px;margin-top:4px}
.btn-add:hover{background:#f0f0ee;color:#333}
.btn-exp{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.btn-exp:hover{background:#333}
.btn-exp:disabled{opacity:.35;cursor:not-allowed}
.empty{font-size:13px;color:#bbb;text-align:center;padding:1rem 0}
.form-box{background:#fff;border:1.5px solid #c5d8ee;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.form-box h2{font-size:14px;font-weight:700;margin-bottom:12px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.note{font-size:11px;color:#888;margin-top:6px;padding:5px 10px;background:#f5f5f3;border-radius:6px}
</style>
</head>
<body>
<div class="app">
  <h1>Záměření — Plisé rolety</h1>
  <p class="sub">Vyplňte zakázku, přidejte rolety a stáhněte Excel.</p>

  <div class="section">
    <div class="stitle">Zakázka</div>
    <div class="row2">
      <div class="field"><label>Jméno klienta</label><input id="klient" placeholder="Novák Jan"></div>
      <div class="field"><label>Číslo zakázky</label><input id="zakazka" placeholder="2026-001"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Adresa</label><input id="adresa" placeholder="Hlavní 1, Praha"></div>
      <div class="field"><label>Datum záměření</label><input type="date" id="datum"></div>
    </div>
    <div class="field"><label>Technik</label><input id="technik" placeholder="Jméno technika"></div>
  </div>

  <div class="form-box">
    <h2>Přidat plisé roletu</h2>
    <div class="row2">
      <div class="field"><label>Místnost</label><input id="f-mis" placeholder="např. Ložnice, Obývák"></div>
      <div class="field"><label>Typ uchycení</label>
        <select id="f-uch"><option value="">— vyberte —</option><option>Zasklívačka</option><option>Rám okna</option></select>
      </div>
    </div>
    <div class="row3">
      <div class="field"><label>Šířka (mm)</label><input type="number" id="f-s" placeholder="800" min="1"></div>
      <div class="field"><label>Výška (mm)</label><input type="number" id="f-v" placeholder="1200" min="1"></div>
      <div class="field"><label>Počet ks</label><input type="number" id="f-p" value="1" min="1"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Kód látky</label><input id="f-lat" placeholder="např. PL-301"></div>
      <div class="field"><label>Barva profilu</label><input id="f-pro" placeholder="např. Bílá"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Barva vodící lišty (střešní)</label><input id="f-lis" placeholder="např. Bílá"></div>
      <div class="field"><label>Ovládací tyč — délka (mm)</label><input type="number" id="f-tyc" placeholder="1000" min="1"></div>
    </div>
    <div class="note">m² se dopočítá automaticky z rozměrů</div>
    <div class="field" style="margin-top:10px"><label>Poznámka</label><input id="f-poz" placeholder="Volitelná poznámka..."></div>
    <button class="btn-add" id="btn-add">+ přidat roletu do zakázky</button>
  </div>

  <div class="section">
    <div class="top-bar">
      <div class="stitle" style="margin:0">Přidané rolety</div>
      <span class="badge" id="badge">0 položek</span>
    </div>
    <div id="list"><div class="empty">Zatím žádná roleta.</div></div>
  </div>

  <button class="btn-exp" id="btn-exp" disabled>⬇ Stáhnout Excel (.xlsx)</button>
</div>

<script>
// Minimal xlsx builder — no external dependencies
function xlsxBuild(sheets) {
  const files = {};
  const rels = [];
  const sheetXmls = [];

  sheets.forEach((s, si) => {
    const rid = 'rId' + (si+1);
    const name = 'sheet' + (si+1);
    rels.push(`<Relationship Id="${rid}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/${name}.xml"/>`);
    sheetXmls.push({name, xml: buildSheet(s.rows, s.cols), sheetName: s.name, rid});
    files[`xl/worksheets/${name}.xml`] = sheetXmls[si].xml;
  });

  const styleXml = buildStyles();
  files['xl/styles.xml'] = styleXml;

  files['[Content_Types].xml'] = `<?xml version="1.0" encoding="UTF-8"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
${sheetXmls.map((_,i)=>`<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join('')}
<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
</Types>`;

  files['_rels/.rels'] = `<?xml version="1.0" encoding="UTF-8"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`;

  files['xl/_rels/workbook.xml.rels'] = `<?xml version="1.0" encoding="UTF-8"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
${rels.join('')}
<Relationship Id="rIdS" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`;

  files['xl/workbook.xml'] = `<?xml version="1.0" encoding="UTF-8"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<sheets>${sheetXmls.map((s,i)=>`<sheet name="${esc(s.sheetName)}" sheetId="${i+1}" r:id="${s.rid}"/>`).join('')}</sheets>
</workbook>`;

  return zipFiles(files);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Style indices: 0=default, 1=header, 2=info-label, 3=info-val, 4=data, 5=data-alt, 6=footer, 7=title, 8=subtitle
function buildStyles(){
  return `<?xml version="1.0" encoding="UTF-8"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<fonts count="7">
<font><sz val="10"/><name val="Arial"/></font>
<font><sz val="14"/><b/><color rgb="FFFFFFFF"/><name val="Arial"/></font>
<font><sz val="9"/><color rgb="FFAAAAAA"/><name val="Arial"/></font>
<font><sz val="7"/><b/><color rgb="FF888888"/><name val="Arial"/></font>
<font><sz val="10"/><b/><color rgb="FF1A1A1A"/><name val="Arial"/></font>
<font><sz val="9"/><b/><color rgb="FFFFFFFF"/><name val="Arial"/></font>
<font><sz val="8"/><i/><color rgb="FF888888"/><name val="Arial"/></font>
</fonts>
<fills count="7">
<fill><patternFill patternType="none"/></fill>
<fill><patternFill patternType="gray125"/></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FF1A1A1A"/></patternFill></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FFF5F5F3"/></patternFill></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FFFFFFFF"/></patternFill></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FFF8F8F6"/></patternFill></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FF1A1A1A"/></patternFill></fill>
</fills>
<borders count="2">
<border><left/><right/><top/><bottom/></border>
<border><left style="thin"><color rgb="FFCCCCCC"/></left><right style="thin"><color rgb="FFCCCCCC"/></right><top style="thin"><color rgb="FFCCCCCC"/></top><bottom style="thin"><color rgb="FFCCCCCC"/></bottom></border>
</borders>
<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
<cellXfs count="9">
<xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>
<xf numFmtId="0" fontId="1" fillId="2" borderId="0" xfId="0"><alignment horizontal="left" vertical="center" indent="1"/></xf>
<xf numFmtId="0" fontId="2" fillId="2" borderId="0" xfId="0"><alignment horizontal="left" vertical="center" indent="1"/></xf>
<xf numFmtId="0" fontId="3" fillId="3" borderId="0" xfId="0"><alignment horizontal="left" vertical="bottom" indent="1"/></xf>
<xf numFmtId="0" fontId="4" fillId="3" borderId="0" xfId="0"><alignment horizontal="left" vertical="center" indent="1"/></xf>
<xf numFmtId="0" fontId="5" fillId="6" borderId="0" xfId="0"><alignment horizontal="left" vertical="center" indent="1" wrapText="1"/></xf>
<xf numFmtId="0" fontId="0" fillId="4" borderId="1" xfId="0"><alignment horizontal="left" vertical="center" indent="1"/></xf>
<xf numFmtId="0" fontId="0" fillId="5" borderId="1" xfId="0"><alignment horizontal="left" vertical="center" indent="1"/></xf>
<xf numFmtId="0" fontId="6" fillId="3" borderId="0" xfId="0"><alignment horizontal="left" vertical="center" indent="1"/></xf>
</cellXfs>
</styleSheet>`;
}

function colLetter(n){let s='';while(n>0){n--;s=String.fromCharCode(65+n%26)+s;n=Math.floor(n/26);}return s;}

function buildSheet(rows, colWidths){
  const maxCol = Math.max(...rows.map(r=>r.cells?r.cells.length:1));
  let xml = `<?xml version="1.0" encoding="UTF-8"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">`;

  if(colWidths){
    xml += '<cols>';
    colWidths.forEach((w,i)=>{xml+=`<col min="${i+1}" max="${i+1}" width="${w}" customWidth="1"/>`;});
    xml += '</cols>';
  }

  xml += '<sheetData>';
  rows.forEach(r=>{
    if(!r.cells){xml+=`<row ht="${r.ht||15}" customHeight="1"/>`;return;}
    xml+=`<row ht="${r.ht||18}" customHeight="1">`;
    r.cells.forEach((cell,ci)=>{
      if(!cell)return;
      const ref = colLetter(ci+1)+(r.ri||1);
      const s = cell.s||0;
      const v = cell.v;
      if(v===null||v===undefined||v===''){xml+=`<c r="${ref}" s="${s}"/>`;return;}
      if(typeof v==='number'){xml+=`<c r="${ref}" t="n" s="${s}"><v>${v}</v></c>`;}
      else{xml+=`<c r="${ref}" t="inlineStr" s="${s}"><is><t>${esc(String(v))}</t></is></c>`;}
    });
    xml+='</row>';
  });
  xml+='</sheetData>';

  // merges
  const merges = rows.flatMap(r=>r.merges||[]);
  if(merges.length){xml+=`<mergeCells count="${merges.length}">${merges.map(m=>`<mergeCell ref="${m}"/>`).join('')}</mergeCells>`;}

  xml+='</worksheet>';
  return xml;
}

// ZIP builder (no compression — store only)
function zipFiles(files){
  const entries = [];
  const enc = new TextEncoder();
  let offset = 0;
  const centralDir = [];

  function crc32(buf){
    let c=0xFFFFFFFF;
    const t=new Uint32Array(256);
    for(let i=0;i<256;i++){let x=i;for(let j=0;j<8;j++)x=x&1?0xEDB88320^(x>>>1):x>>>1;t[i]=x;}
    for(let i=0;i<buf.length;i++)c=t[(c^buf[i])&0xFF]^(c>>>8);
    return(c^0xFFFFFFFF)>>>0;
  }

  function u16(v){const b=new Uint8Array(2);new DataView(b.buffer).setUint16(0,v,true);return b;}
  function u32(v){const b=new Uint8Array(4);new DataView(b.buffer).setUint32(0,v,true);return b;}

  for(const [name, content] of Object.entries(files)){
    const nameBuf = enc.encode(name);
    const dataBuf = typeof content==='string'?enc.encode(content):content;
    const crc = crc32(dataBuf);
    const localHeader = new Uint8Array([
      0x50,0x4B,0x03,0x04,
      20,0, 0,0, 0,0, 0,0,0,0,
      ...u32(crc), ...u32(dataBuf.length), ...u32(dataBuf.length),
      ...u16(nameBuf.length), ...u16(0),
      ...nameBuf
    ]);
    centralDir.push({name:nameBuf, crc, size:dataBuf.length, offset});
    entries.push(localHeader, dataBuf);
    offset += localHeader.length + dataBuf.length;
  }

  const cdOffset = offset;
  const cdEntries = centralDir.map(({name,crc,size,offset})=>{
    return new Uint8Array([
      0x50,0x4B,0x01,0x02,
      20,0, 20,0, 0,0, 0,0, 0,0,0,0,
      ...u32(crc), ...u32(size), ...u32(size),
      ...u16(name.length), ...u16(0), ...u16(0),
      0,0, 0,0, 0,0,0,0,
      ...u32(offset), ...name
    ]);
  });
  const cdSize = cdEntries.reduce((s,e)=>s+e.length,0);
  const eocd = new Uint8Array([
    0x50,0x4B,0x05,0x06, 0,0, 0,0,
    ...u16(centralDir.length), ...u16(centralDir.length),
    ...u32(cdSize), ...u32(cdOffset), 0,0
  ]);

  const all = [...entries, ...cdEntries, eocd];
  const total = all.reduce((s,a)=>s+a.length,0);
  const out = new Uint8Array(total);
  let pos=0;
  all.forEach(a=>{out.set(a,pos);pos+=a.length;});
  return out;
}

// --- App logic ---
let items = [];
document.getElementById('datum').value = new Date().toISOString().split('T')[0];

function plural(n){return n===1?'1 položka':n>=2&&n<=4?n+' položky':n+' položek';}
function m2(s,v){return Math.round((s/1000)*(v/1000)*100)/100;}

function render(){
  const list=document.getElementById('list');
  document.getElementById('badge').textContent=plural(items.length);
  document.getElementById('btn-exp').disabled=items.length===0;
  if(!items.length){list.innerHTML='<div class="empty">Zatím žádná roleta.</div>';return;}
  list.innerHTML=items.map((o,i)=>`
    <div class="card">
      <div>
        <div class="card-name">${o.mis} <span style="font-weight:400;color:#888">— ${o.uch||'—'}</span></div>
        <div class="card-meta">
          ${o.s} × ${o.v} mm · ${o.p} ks · ${m2(o.s,o.v)} m²<br>
          Látka: ${o.lat||'—'} · Profil: ${o.pro||'—'}${o.lis?' · Lišta: '+o.lis:''}${o.tyc?' · Tyč: '+o.tyc+' mm':''}${o.poz?'<br>'+o.poz:''}
        </div>
      </div>
      <button class="del" onclick="del(${i})">✕</button>
    </div>`).join('');
}

window.del=i=>{items.splice(i,1);render();};

document.getElementById('btn-add').addEventListener('click',()=>{
  const mis=document.getElementById('f-mis').value.trim();
  const s=document.getElementById('f-s').value;
  const v=document.getElementById('f-v').value;
  if(!mis||!s||!v){alert('Vyplňte místnost a rozměry.');return;}
  items.push({
    mis, s:+s, v:+v,
    p:+(document.getElementById('f-p').value||1),
    lat:document.getElementById('f-lat').value.trim(),
    pro:document.getElementById('f-pro').value.trim(),
    lis:document.getElementById('f-lis').value.trim(),
    tyc:document.getElementById('f-tyc').value?+document.getElementById('f-tyc').value:'',
    uch:document.getElementById('f-uch').value,
    poz:document.getElementById('f-poz').value.trim()
  });
  ['f-mis','f-s','f-v','f-lat','f-pro','f-lis','f-tyc','f-uch','f-poz'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-p').value='1';
  render();
});

document.getElementById('btn-exp').addEventListener('click',()=>{
  const klient=document.getElementById('klient').value||'—';
  const zakazka=document.getElementById('zakazka').value||'—';
  const adresa=document.getElementById('adresa').value||'—';
  const datum=document.getElementById('datum').value||'—';
  const technik=document.getElementById('technik').value||'—';

  const NCOLS = 11;
  const lastCol = colLetter(NCOLS);

  // Style indices
  const S_DEF=0, S_TITLE=1, S_SUBTITLE=2, S_INFO_LBL=3, S_INFO_VAL=4, S_HDR=5, S_DATA=6, S_DATA_ALT=7, S_FOOTER=8;

  let ri = 1;
  const rows = [];
  const merges = [];

  function addMerge(c1,r1,c2,r2){merges.push(`${colLetter(c1)}${r1}:${colLetter(c2)}${r2}`);}
  function blankRow(ht=8){rows.push({ri:ri++,ht,cells:Array(NCOLS).fill({v:'',s:S_TITLE})});}
  function titleRow(text, s, ht){
    const cells=Array(NCOLS).fill({v:'',s});
    cells[0]={v:text,s};
    addMerge(1,ri,NCOLS,ri);
    rows.push({ri:ri++,ht,cells});
  }

  // Row 1: spacer dark
  blankRow(8);

  // Row 2: title
  titleRow(`Výrobní dokumentace — Plisé standard / střešní  ·  Zakázka ${zakazka}`, S_TITLE, 28);

  // Row 3: subtitle
  titleRow(`Klient: ${klient}    ·    Adresa: ${adresa}    ·    Technik: ${technik}    ·    Datum: ${datum}`, S_SUBTITLE, 18);

  // Row 4: spacer gray
  rows.push({ri:ri++,ht:8,cells:Array(NCOLS).fill({v:'',s:S_INFO_LBL})});

  // Row 5: spacer gray
  rows.push({ri:ri++,ht:6,cells:Array(NCOLS).fill({v:'',s:S_INFO_LBL})});

  // Row 6: info labels
  const lblCells = Array(NCOLS).fill({v:'',s:S_INFO_LBL});
  lblCells[0]={v:'KLIENT',s:S_INFO_LBL};
  lblCells[3]={v:'ADRESA',s:S_INFO_LBL};
  lblCells[6]={v:'ZAKÁZKA',s:S_INFO_LBL};
  lblCells[9]={v:'TECHNIK',s:S_INFO_LBL};
  addMerge(1,ri,3,ri); addMerge(4,ri,6,ri); addMerge(7,ri,9,ri); addMerge(10,ri,NCOLS,ri);
  rows.push({ri:ri++,ht:16,cells:lblCells});

  // Row 7: info values
  const valCells = Array(NCOLS).fill({v:'',s:S_INFO_VAL});
  valCells[0]={v:klient,s:S_INFO_VAL};
  valCells[3]={v:adresa,s:S_INFO_VAL};
  valCells[6]={v:zakazka,s:S_INFO_VAL};
  valCells[9]={v:technik,s:S_INFO_VAL};
  addMerge(1,ri,3,ri); addMerge(4,ri,6,ri); addMerge(7,ri,9,ri); addMerge(10,ri,NCOLS,ri);
  rows.push({ri:ri++,ht:20,cells:valCells});

  // Row 8: spacer
  rows.push({ri:ri++,ht:10,cells:Array(NCOLS).fill({v:'',s:S_INFO_LBL})});

  // Row 9: spacer
  rows.push({ri:ri++,ht:6,cells:Array(NCOLS).fill({v:'',s:S_DEF})});

  // Row 10: header
  const headers=['Místnost','Šířka (mm)','Výška (mm)','m²','Barva profilu','Kód látky','Vodící lišta','Typ uchycení','Tyč (mm)','Ks','Poznámka'];
  rows.push({ri:ri++,ht:22,cells:headers.map(h=>({v:h,s:S_HDR}))});

  // Data rows
  items.forEach((o,i)=>{
    const s = i%2===0?S_DATA:S_DATA_ALT;
    rows.push({ri:ri++,ht:20,cells:[
      {v:o.mis,s},{v:o.s,s},{v:o.v,s},{v:m2(o.s,o.v),s},
      {v:o.pro,s},{v:o.lat,s},{v:o.lis,s},{v:o.uch,s},
      {v:o.tyc||'',s},{v:o.p,s},{v:o.poz,s}
    ]});
  });

  // Footer
  rows.push({ri:ri++,ht:6,cells:Array(NCOLS).fill({v:'',s:S_FOOTER})});
  const totalKs = items.reduce((s,o)=>s+o.p,0);
  const ftCells = Array(NCOLS).fill({v:'',s:S_FOOTER});
  ftCells[0]={v:`Celkem položek: ${items.length}   ·   Celkem ks: ${totalKs}`,s:S_FOOTER};
  ftCells[7]={v:'Podpis technika: ___________________________',s:S_FOOTER};
  addMerge(1,ri,5,ri); addMerge(8,ri,NCOLS,ri);
  rows.push({ri:ri++,ht:18,cells:ftCells});

  rows.forEach(r=>r.merges=merges);

  const colWidths=[20,12,12,8,16,14,16,16,12,6,28];
  const xlsx = xlsxBuild([{name:'Výrobní dokumentace', rows, cols:colWidths}]);
  const blob = new Blob([xlsx],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;
  a.download=`${zakazka}_${klient.replace(/\s+/g,'-')}.xlsx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
