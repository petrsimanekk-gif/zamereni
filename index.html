<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Záměření stínění</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Přihlašovací obrazovka -->
<div id="login-screen" style="display:none;min-height:100vh;align-items:center;justify-content:center;background:#f7f4f4">
  <div style="background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(100,0,0,.15);margin:1rem">
    <div style="text-align:center;margin-bottom:1.75rem">
      <img src="zaluzie-snadno-logo.svg" alt="Žaluzie snadno" style="height:38px;margin-bottom:1.25rem">
      <div style="font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:4px">Záměření stínění</div>
      <div style="font-size:13px;color:#999">Zadejte přístupové heslo</div>
    </div>
    <div style="margin-bottom:12px">
      <input id="login-heslo" type="password" placeholder="Heslo" style="width:100%;padding:11px 14px;border:1.5px solid #e5e0e0;border-radius:8px;font-size:15px;outline:none;font-family:inherit">
    </div>
    <div id="login-err" style="display:none;font-size:12px;color:#cb1419;margin-bottom:10px;text-align:center;font-weight:600">Nesprávné heslo. Zkuste to znovu.</div>
    <button id="btn-login" style="width:100%;padding:13px;background:linear-gradient(135deg,#8a0c10,#cb1419);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">Přihlásit se</button>
    <div style="text-align:center;margin-top:1rem;font-size:11px;color:#bbb">Zapomněli jste heslo? Kontaktujte administrátora.</div>
  </div>
</div>

<!-- Hlavní aplikace -->
<div id="app" style="display:none">

  <div class="app-header">
    <div class="header-inner">
      <div>
        <h1>Záměření stínění</h1>
        <p class="sub">Vyplňte zakázku, vyberte produkt a přidejte položky.</p>
      </div>
      <img src="zaluzie-snadno-logo.svg" alt="Žaluzie snadno" class="header-logo">
    </div>
  </div>

  <div class="section">
    <div class="stitle">Zakázka</div>
    <div class="row2">
      <div class="field"><label>Jméno klienta</label><input id="klient" placeholder="Novák Jan"></div>
      <div class="field"><label>Číslo zakázky</label><input id="zakazka" placeholder="2026-001"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Adresa</label><input id="adresa" placeholder="Hlavní 1, Praha"></div>
      <div class="field"><label>Datum záměření</label><input type="date" id="datum"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Technik</label><input id="technik" placeholder="Jméno technika"></div>
      <div class="field"><label>Telefon technika</label><input id="technik-tel" placeholder="+420 777 123 456"></div>
    </div>
  </div>

  <div class="section">
    <div class="stitle">Typ produktu</div>
    <select id="typ-select" style="font-size:15px;padding:10px;border-radius:10px;border:1px solid #ddd;width:100%;background:#fff;color:#1a1a1a">
      <option value="">— vyberte typ produktu —</option>
      <optgroup label="Látkové střešní rolety">
        <option value="stresni">Látkové střešní rolety</option>
      </optgroup>
      <optgroup label="Rolety den a noc">
        <option value="aluvegasdn">Den a noc — Alu Vegas</option>
        <option value="maxidn">Den a noc — Maxi kazeta</option>
        <option value="otevrenadn">Den a noc — Otevřená kazeta</option>
        <option value="polodn">Den a noc — Polo kazeta</option>
        <option value="sonosdn">Den a noc — SONO S</option>
        <option value="sonolldn">Den a noc — SONO L</option>
      </optgroup>
      <optgroup label="Textilní rolety">
        <option value="aluvegastx">Textilní — Alu Classic</option>
        <option value="maxitx">Textilní — Maxi kazeta</option>
        <option value="otevrenatx">Textilní — Otevřená kazeta</option>
        <option value="polotx">Textilní — Polo kazeta</option>
        <option value="sonostx">Textilní — SONO S</option>
        <option value="sonolltx">Textilní — SONO L</option>
      </optgroup>
      <optgroup label="Plisé rolety">
        <option value="plise">Plisé roleta</option>
      </optgroup>
      <optgroup label="Žaluzie">
        <option value="horizont">Horizontální žaluzie</option>
        <option value="vertikal">Vertikální žaluzie</option>
      </optgroup>
      <optgroup label="Sítě proti hmyzu">
        <option value="sit_dverpant">Dveřní síť — pantová</option>
        <option value="sit_plise">Plisé síť proti hmyzu</option>
        <option value="sit_posuvram">Posuvná síť — v rámu</option>
        <option value="sit_posuvlist">Posuvná síť — v lištách</option>
        <option value="sit_pevna">Pevná okenní síť</option>
        <option value="sit_rolovaci">Rolovací síť</option>
      </optgroup>
    </select>
  </div>

  <div class="form-box" id="form-box" style="display:none">
    <div class="form-box-title" id="form-title"></div>
    <div id="form-fields"></div>
    <button class="btn-add" id="btn-pridat">+ přidat do zakázky</button>
  </div>

  <div class="section">
    <div class="top-bar">
      <div class="stitle" style="margin:0">Přidané položky</div>
      <span class="badge" id="badge">0 položek</span>
    </div>
    <div id="list"><div class="empty">Zatím žádná položka.</div></div>
  </div>

  <button class="btn-exp" id="btn-exp" disabled>⬇ Stáhnout Excel (.xlsx)</button>
  <button class="btn-pdf" id="btn-pdf" disabled>📄 Nabídka pro klienta (PDF)</button>
  <button class="btn-reset" id="btn-reset">Nová zakázka (smazat vše)</button>
</div>
</div><!-- konec #app -->
<script src="app_v23.js"></script>
</body>
</html>
